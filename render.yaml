services:
  - type: web
    name: lost-find-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:///lost_find.db
      - key: MAX_CONTENT_LENGTH
        value: "2097152"
      - key: SERVER_URL
        value: https://your-backend-url.onrender.com
